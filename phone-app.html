<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VRHand — Teléfono</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #05080f;
  --accent: #7c3aed;
  --accent2: #06b6d4;
  --ok: #10b981;
  --warn: #f59e0b;
  --err: #ef4444;
  --text: #e2e8f0;
  --muted: #475569;
  --panel: rgba(13,20,34,0.92);
}
body { background:#000; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; color:var(--text); touch-action:none; }

/* ── VR stereo view ── */
#vr-layer {
  position:fixed; inset:0;
  display:flex;
  background:#000;
}
.eye {
  flex:1;
  position:relative;
  overflow:hidden;
}
.eye-canvas {
  position:absolute; inset:0;
  width:100%; height:100%;
}
.divider {
  width:3px;
  background:#111;
  flex-shrink:0;
}

/* ── Camera (hidden, used for ML) ── */
#video {
  position:fixed;
  width:1px; height:1px;
  opacity:0; pointer-events:none;
}
#track-canvas {
  position:fixed;
  width:1px; height:1px;
  opacity:0; pointer-events:none;
}

/* ── HUD overlay ── */
#hud {
  position:fixed; inset:0;
  pointer-events:none;
  z-index:50;
}

/* Connection bar */
#conn-bar {
  position:absolute;
  top:0; left:0; right:0;
  height:36px;
  background:rgba(5,8,15,0.85);
  border-bottom:1px solid #1e293b;
  display:flex;
  align-items:center;
  padding:0 12px;
  gap:8px;
  pointer-events:all;
}
.dot { width:7px;height:7px;border-radius:50%;background:var(--muted); }
.dot.ok  { background:var(--ok);  box-shadow:0 0 6px var(--ok); }
.dot.err { background:var(--err); box-shadow:0 0 6px var(--err); }
.dot.warn{ background:var(--warn);box-shadow:0 0 6px var(--warn); }
#conn-label { font-size:11px; color:var(--muted); flex:1; }

#ip-input {
  background:rgba(30,41,59,0.8);
  border:1px solid #334155;
  border-radius:5px;
  color:var(--text);
  font-size:12px;
  padding:3px 8px;
  width:130px;
  pointer-events:all;
}
#conn-btn {
  background:var(--accent);
  border:none; border-radius:5px;
  color:#fff; font-size:11px; font-weight:600;
  padding:4px 10px; cursor:pointer;
  pointer-events:all;
}

/* Gesture badges */
#gesture-hud {
  position:absolute;
  bottom:20px; left:0; right:0;
  display:flex;
  justify-content:space-between;
  padding:0 16px;
}
.gesture-badge {
  background:var(--panel);
  border:1px solid #1e293b;
  border-radius:10px;
  padding:8px 14px;
  text-align:center;
  min-width:90px;
  backdrop-filter:blur(8px);
}
.gesture-badge .label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
.gesture-badge .value { font-size:14px; font-weight:700; margin-top:2px; }
.gesture-badge.active .value { color:var(--accent2); }

/* Scan lines VR effect */
#scan-lines {
  position:fixed; inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events:none;
  z-index:49;
}

/* Vignette per eye */
.vignette {
  position:absolute; inset:0;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
  pointer-events:none;
  z-index:5;
}

/* Setup overlay */
#setup {
  position:fixed; inset:0;
  background:var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; z-index:100;
  padding:24px;
}
#setup h1 { font-size:22px; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
#setup p { font-size:13px; color:var(--muted); text-align:center; line-height:1.6; max-width:300px; }
.setup-field { display:flex; flex-direction:column; gap:6px; width:100%; max-width:280px; }
.setup-field label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
.setup-field input {
  background:#0d1422; border:1px solid #1e293b; border-radius:8px;
  color:var(--text); font-size:16px; padding:10px 14px;
  width:100%;
}
.setup-field input:focus { outline:none; border-color:var(--accent); }
#start-btn {
  background:linear-gradient(135deg,var(--accent),#6d28d9);
  border:none; border-radius:10px; color:#fff;
  font-size:16px; font-weight:700;
  padding:14px 36px; cursor:pointer;
  box-shadow:0 0 24px rgba(124,58,237,0.4);
  width:100%; max-width:280px;
}
.tip-box {
  background:#0d1422; border:1px solid #1e293b; border-radius:8px;
  padding:12px 16px; font-size:11px; color:var(--muted);
  line-height:1.7; max-width:300px;
}
.tip-box strong { color:var(--accent2); }
</style>
</head>
<body>

<!-- Setup screen -->
<div id="setup">
  <h1>VRHand</h1>
  <p>Hand tracking desde tu teléfono → VRChat en PC vía OSC</p>

  <div class="setup-field">
    <label>IP de tu PC (misma red WiFi)</label>
    <input type="text" id="pc-ip" placeholder="192.168.1.x" inputmode="decimal"
           value="">
  </div>

  <div class="tip-box">
    <strong>Cómo encontrar tu IP:</strong><br>
    Windows: <code>ipconfig</code> → IPv4<br>
    El bridge debe estar corriendo:<br>
    <code>node bridge.js</code>
  </div>

  <button id="start-btn" onclick="startSession()">Iniciar</button>
</div>

<!-- VR Layer — two eyes -->
<div id="vr-layer" style="display:none">
  <div class="eye" id="eye-left">
    <canvas class="eye-canvas" id="canvas-left"></canvas>
    <div class="vignette"></div>
  </div>
  <div class="divider"></div>
  <div class="eye" id="eye-right">
    <canvas class="eye-canvas" id="canvas-right"></canvas>
    <div class="vignette"></div>
  </div>
</div>

<div id="scan-lines"></div>

<!-- Hidden ML elements -->
<video id="video" autoplay playsinline muted></video>
<canvas id="track-canvas"></canvas>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="conn-bar">
    <div class="dot" id="ws-dot"></div>
    <span id="conn-label">Conectando...</span>
    <input id="ip-input" type="text" style="display:none">
    <button id="conn-btn" style="display:none" onclick="reconnect()">Reconectar</button>
  </div>

  <div id="gesture-hud">
    <div class="gesture-badge" id="badge-left">
      <div class="label">Mano Izq</div>
      <div class="value" id="gesture-left">—</div>
    </div>
    <div class="gesture-badge" id="badge-right">
      <div class="label">Mano Der</div>
      <div class="value" id="gesture-right">—</div>
    </div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let ws = null;
let pcIp = '';
let animFrame = null;
let lastHandData = null;
let cameraStream = null; // reuse stream

// ─── Request camera permission on load ───────────────────────────────────────
async function requestCameraEarly() {
  const startBtn = document.getElementById('start-btn');
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } }
    });
    document.getElementById('video').srcObject = cameraStream;
    startBtn.textContent = '✅ Cámara lista — Iniciar';
    startBtn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
  } catch(e) {
    startBtn.textContent = '⚠️ Permitir cámara primero';
    startBtn.style.background = 'linear-gradient(135deg,#ef4444,#b91c1c)';
    startBtn.onclick = () => requestCameraEarly();
  }
}
window.addEventListener('DOMContentLoaded', requestCameraEarly);

// ─── Gesture names (matches bridge.js) ───────────────────────────────────────
const GESTURE_NAMES = ['Neutral','Puño','Abierta','Apuntar','Paz','Rock','Pistola','Pulgar👍'];

// ─── VR stereo renderer ──────────────────────────────────────────────────────
const canvases = {
  left:  document.getElementById('canvas-left'),
  right: document.getElementById('canvas-right'),
};
const ctxs = {
  left:  canvases.left.getContext('2d'),
  right: canvases.right.getContext('2d'),
};

// Hand skeleton colors
const HAND_COLORS = {
  joint: '#7c3aed',
  bone:  '#06b6d4',
  tip:   '#f0abfc',
};

// MediaPipe hand connections
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],       // thumb
  [0,5],[5,6],[6,7],[7,8],       // index
  [0,9],[9,10],[10,11],[11,12],  // middle
  [0,13],[13,14],[14,15],[15,16],// ring
  [0,17],[17,18],[18,19],[19,20],// pinky
  [5,9],[9,13],[13,17],          // palm
];

function resizeCanvases() {
  ['left','right'].forEach(eye => {
    const el = document.getElementById(`eye-${eye}`);
    canvases[eye].width  = el.clientWidth;
    canvases[eye].height = el.clientHeight;
  });
}

function drawHandSkeleton(ctx, landmarks, W, H, alpha=1) {
  if (!landmarks) return;

  // Bones
  ctx.globalAlpha = alpha * 0.8;
  HAND_CONNECTIONS.forEach(([a,b]) => {
    const p1 = landmarks[a], p2 = landmarks[b];
    ctx.beginPath();
    ctx.moveTo(p1.x * W, p1.y * H);
    ctx.lineTo(p2.x * W, p2.y * H);
    ctx.strokeStyle = HAND_COLORS.bone;
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Joints
  landmarks.forEach((p, i) => {
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    const isTip = [4,8,12,16,20].includes(i);
    ctx.arc(p.x * W, p.y * H, isTip ? 5 : 3, 0, Math.PI*2);
    ctx.fillStyle = isTip ? HAND_COLORS.tip : HAND_COLORS.joint;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function renderVR() {
  ['left','right'].forEach(eye => {
    const ctx = ctxs[eye];
    const W = canvases[eye].width;
    const H = canvases[eye].height;

    // Black VR background
    ctx.fillStyle = '#000008';
    ctx.fillRect(0, 0, W, H);

    // Grid floor (perspective)
    ctx.strokeStyle = 'rgba(30,41,59,0.6)';
    ctx.lineWidth = 0.5;
    const GRID = 8;
    const ey = eye === 'left' ? -0.015 : 0.015; // slight IPD offset
    for (let i = 0; i <= GRID; i++) {
      const x = (i / GRID) * W;
      ctx.beginPath(); ctx.moveTo(x, H*0.5); ctx.lineTo(x + ey*W*2, H);
      ctx.stroke();
    }
    for (let j = 0; j <= 6; j++) {
      const y = H*0.5 + j * (H*0.5/6);
      ctx.beginPath(); ctx.moveTo(0 + ey*W*j*0.3, y); ctx.lineTo(W + ey*W*j*0.3, y);
      ctx.stroke();
    }

    // Subtle horizon glow
    const grad = ctx.createLinearGradient(0, H*0.4, 0, H*0.6);
    grad.addColorStop(0, 'rgba(124,58,237,0.0)');
    grad.addColorStop(0.5, 'rgba(124,58,237,0.07)');
    grad.addColorStop(1, 'rgba(6,182,212,0.0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, H*0.4, W, H*0.2);

    // Hands (mirrored for VR perspective)
    if (lastHandData) {
      if (lastHandData.leftHand) {
        const mirrored = lastHandData.leftHand.map(p => ({...p, x: 1 - p.x}));
        drawHandSkeleton(ctx, mirrored, W, H);
      }
      if (lastHandData.rightHand) {
        const mirrored = lastHandData.rightHand.map(p => ({...p, x: 1 - p.x}));
        drawHandSkeleton(ctx, mirrored, W, H);
      }
    }

    // IPD center line hint (faint)
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#fff';
    ctx.fillRect(W/2 - 0.5, 0, 1, H);
    ctx.globalAlpha = 1;
  });

  animFrame = requestAnimationFrame(renderVR);
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const url = `ws://${pcIp}:8765`;
  setConnStatus('warn', `Conectando a ${url}...`);

  ws = new WebSocket(url);

  ws.onopen = () => {
    setConnStatus('ok', `Conectado → ${pcIp}`);
    document.getElementById('conn-btn').style.display = 'none';
  };

  ws.onerror = () => {
    setConnStatus('err', 'Error de conexión');
    document.getElementById('ip-input').style.display = 'block';
    document.getElementById('conn-btn').style.display = 'block';
  };

  ws.onclose = () => {
    setConnStatus('err', 'Desconectado');
    document.getElementById('ip-input').style.display = 'block';
    document.getElementById('conn-btn').style.display = 'block';
    setTimeout(connectWS, 3000); // auto-reconnect
  };
}

function reconnect() {
  const newIp = document.getElementById('ip-input').value.trim();
  if (newIp) pcIp = newIp;
  if (ws) ws.close();
  connectWS();
}

function sendHandData(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'hands', ...data }));
  }
}

function setConnStatus(state, text) {
  const dot = document.getElementById('ws-dot');
  dot.className = `dot ${state}`;
  document.getElementById('conn-label').textContent = text;
}

// ─── MediaPipe Hands ──────────────────────────────────────────────────────────
function startHandTracking() {
  const video = document.getElementById('video');

  const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });

  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.65,
    minTrackingConfidence: 0.55,
  });

  hands.onResults((results) => {
    let leftHand = null, rightHand = null;

    if (results.multiHandLandmarks && results.multiHandedness) {
      results.multiHandedness.forEach((hand, i) => {
        // MediaPipe label: "Left"/"Right" are flipped (front camera)
        if (hand.label === 'Right') leftHand  = results.multiHandLandmarks[i];
        else                         rightHand = results.multiHandLandmarks[i];
      });
    }

    lastHandData = { leftHand, rightHand };
    sendHandData({ leftHand, rightHand });
    updateGestureHUD(leftHand, rightHand);
  });

  const mpCam = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 320, height: 240
  });
  mpCam.start();
}

// ─── Gesture detection (client-side, for HUD display only) ───────────────────
function dist3d(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2+(a.z-b.z)**2);}
function isExtended(lm,tip,mcp){return dist3d(lm[tip],lm[0])>dist3d(lm[mcp],lm[0])*1.15;}

function guessGesture(lm) {
  if (!lm) return '—';
  const th = Math.abs(lm[4].x-lm[0].x) > Math.abs(lm[3].x-lm[0].x)*1.1;
  const ix = isExtended(lm,8,5), mx = isExtended(lm,12,9);
  const rx = isExtended(lm,16,13), px = isExtended(lm,20,17);
  const n = [ix,mx,rx,px].filter(Boolean).length;
  if(n===0&&!th) return '✊ Puño';
  if(n===4)      return '🖐 Abierta';
  if(th&&n===0)  return '👍 Pulgar';
  if(ix&&!mx)    return '👆 Apuntar';
  if(ix&&mx&&!rx&&!px) return '✌️ Paz';
  if(ix&&!mx&&!rx&&px) return '🤘 Rock';
  return '· · ·';
}

function updateGestureHUD(left, right) {
  const gl = guessGesture(left);
  const gr = guessGesture(right);
  document.getElementById('gesture-left').textContent  = gl;
  document.getElementById('gesture-right').textContent = gr;
  document.getElementById('badge-left').classList.toggle('active',  left  !== null);
  document.getElementById('badge-right').classList.toggle('active', right !== null);
}

// ─── Session start ────────────────────────────────────────────────────────────
async function startSession() {
  pcIp = document.getElementById('pc-ip').value.trim();
  if (!pcIp) { alert('Ingresa la IP de tu PC'); return; }

  // Use already-granted stream, or request if not yet granted
  if (!cameraStream) {
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } }
      });
      document.getElementById('video').srcObject = cameraStream;
    } catch(e) {
      alert('No se pudo acceder a la cámara.\n\nEn Chrome: toca el ícono 🔒 en la barra de dirección → Permisos de cámara → Permitir → recarga la página.');
      return;
    }
  }

  // Show VR view
  document.getElementById('setup').style.display = 'none';
  document.getElementById('vr-layer').style.display = 'flex';
  document.getElementById('hud').style.display = 'block';

  // Init
  resizeCanvases();
  window.addEventListener('resize', resizeCanvases);
  renderVR();
  connectWS();
  startHandTracking();
  
  // Request fullscreen for VR immersion
  try {
    document.documentElement.requestFullscreen?.();
    screen.orientation?.lock?.('landscape');
  } catch(e) {}
}
</script>
</body>
</html>
